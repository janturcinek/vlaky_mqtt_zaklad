{% extends "layout.html" %}
{% block content %}

<div class="login-page">
    <div class="login-card">

        <div class="login-card-header">
            <h2>Přihlášení</h2>
            <span class="app-label">Vlaky &mdash; MQTT monitor</span>
        </div>

        <div class="login-card-body">
            <form method="post">
                <div class="field">
                    <label>{{ labels["login"] }}</label>
                    <input type="text" name="username" placeholder="Váš login" required autofocus />
                </div>
                <div class="field">
                    <label>{{ labels["heslo"] }}</label>
                    <input type="password" name="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required />
                </div>
                <input type="submit" name="prihlasit" value="{{ labels['prihlasit'] }}">
            </form>

            {% if flashed_messages %}
                <div class="flash-list">
                    {% for category, message in flashed_messages %}
                        <div class="flash-item {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        </div>

    </div>
</div>

{% endblock %}
